<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
:root{
  --bg-deep:#000d1a;--bg-dark:#001428;--bg-navy:#001f3f;
  --blue-card:#002952;--blue-mid:#003d7a;--blue-btn:#0055a5;
  --blue-light:#0070d0;--cyan:#00b4d8;--cyan-glow:#00d4ff;
  --white:#fff;--w90:rgba(255,255,255,.9);--w70:rgba(255,255,255,.7);
  --w50:rgba(255,255,255,.5);--w20:rgba(255,255,255,.2);--w08:rgba(255,255,255,.08);
  --green:#00e096;--warn:#ffb830;--danger:#ff4d6d;
  --card-bg:rgba(0,30,60,.78);--card-bd:rgba(0,180,216,.22);
  --line:rgba(0,180,216,.13);
  --r-lg:20px;--r-md:14px;--r-sm:10px;
  --shadow:0 20px 60px rgba(0,0,0,.5);--glow:0 0 30px rgba(0,180,216,.28);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg-deep);color:var(--white);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 10% 0%,rgba(0,70,150,.35) 0%,transparent 60%),
  radial-gradient(ellipse 60% 40% at 90% 100%,rgba(0,100,200,.22) 0%,transparent 60%),
  linear-gradient(180deg,#000d1a 0%,#001428 60%,#000d1a 100%);z-index:-2}
body::after{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,180,216,.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,180,216,.04) 1px,transparent 1px);
  background-size:52px 52px;z-index:-1}
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.11;z-index:-1;animation:floatOrb 22s ease-in-out infinite}
.o1{width:600px;height:600px;background:#0055cc;top:-200px;left:-100px;animation-delay:0s}
.o2{width:400px;height:400px;background:#00b4d8;bottom:-100px;right:-100px;animation-delay:-8s}
.o3{width:300px;height:300px;background:#003faa;top:45%;left:48%;animation-delay:-15s}
@keyframes floatOrb{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(28px,-28px) scale(1.05)}66%{transform:translate(-18px,18px) scale(.95)}}
.wrap{max-width:1660px;margin:0 auto;padding:22px 26px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;
  background:rgba(0,22,50,.88);backdrop-filter:blur(22px);border:1px solid rgba(0,180,216,.28);
  border-radius:24px;padding:18px 26px;margin-bottom:18px;
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.07);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan),#0055cc,transparent)}
.logo-area{display:flex;align-items:center;gap:14px}
.logo-icon{width:50px;height:50px;background:linear-gradient(135deg,#003d7a,#0070d0);
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 22px rgba(0,120,220,.55);flex-shrink:0}
.logo-icon svg{width:26px;height:26px}
.logo-text h1{font-size:20px;font-weight:900;letter-spacing:-.5px;
  background:linear-gradient(135deg,#fff,#00d4ff 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-text p{font-size:10.5px;color:var(--w50);margin-top:3px;letter-spacing:.07em;text-transform:uppercase}
.hbadges{display:flex;gap:8px;flex-wrap:wrap}
.hbadge{padding:7px 13px;border-radius:999px;background:rgba(0,50,110,.6);border:1px solid var(--card-bd);
  font-size:11.5px;color:var(--w70);white-space:nowrap}
.hbadge b{color:var(--cyan-glow);font-weight:700}
.status-pill{display:flex;align-items:center;gap:7px;padding:8px 15px;border-radius:999px;
  font-size:11.5px;font-weight:600;cursor:pointer;transition:all .3s;user-select:none}
.status-pill.live{background:rgba(0,224,150,.1);border:1px solid rgba(0,224,150,.3);color:var(--green)}
.status-pill.demo{background:rgba(255,184,48,.1);border:1px solid rgba(255,184,48,.3);color:var(--warn)}
.status-pill.loading{background:rgba(0,180,216,.1);border:1px solid rgba(0,180,216,.3);color:var(--cyan)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:pdot 2s infinite}
.dot.demo{background:var(--warn)}
.dot.loading{background:var(--cyan);animation:pdot 1s infinite}
@keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}

/* TOOLBAR */
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.tabs{display:flex;gap:5px;background:rgba(0,18,42,.85);border:1px solid var(--line);border-radius:var(--r-md);padding:5px}
.tab{padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-size:12.5px;font-weight:700;
  color:var(--w50);background:transparent;transition:all .3s;letter-spacing:.02em;white-space:nowrap}
.tab:hover{color:var(--w70)}
.tab.active.fuel{background:linear-gradient(135deg,rgba(0,100,200,.42),rgba(0,180,216,.28));color:var(--cyan-glow);
  box-shadow:0 0 18px rgba(0,180,216,.2),inset 0 1px 0 rgba(255,255,255,.1);border:1px solid rgba(0,180,216,.32)}
.tab.active.maint{background:linear-gradient(135deg,rgba(0,150,80,.3),rgba(0,224,150,.2));color:var(--green);
  box-shadow:0 0 18px rgba(0,224,150,.15),inset 0 1px 0 rgba(255,255,255,.1);border:1px solid rgba(0,224,150,.28)}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
select,input[type=text]{background:rgba(0,22,52,.85);color:var(--white);border:1px solid var(--card-bd);
  border-radius:var(--r-sm);padding:9px 13px;font-size:12.5px;min-width:165px;
  outline:none;transition:border-color .3s,box-shadow .3s;backdrop-filter:blur(10px)}
select:focus,input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,180,216,.14)}
select option{background:#001428}
.rbtn{display:flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--r-sm);
  background:rgba(0,50,105,.6);border:1px solid var(--card-bd);color:var(--w70);
  font-size:12px;font-weight:600;cursor:pointer;transition:all .3s}
.rbtn:hover{background:rgba(0,75,155,.7);color:var(--cyan);border-color:var(--cyan)}
.rbtn svg{width:14px;height:14px;transition:transform .5s}
.rbtn.spin svg{animation:spin360 .9s linear infinite}
@keyframes spin360{to{transform:rotate(360deg)}}

/* SECTIONS */
.section{display:none;animation:fadeUp .38s ease}
.section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* GRIDS */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:15px}
.g2{display:grid;grid-template-columns:1.35fr .65fr;gap:15px;margin-bottom:15px}
.g2r{display:grid;grid-template-columns:.65fr 1.35fr;gap:15px;margin-bottom:15px}

/* CARD */
.card{background:var(--card-bg);border:1px solid var(--card-bd);border-radius:var(--r-lg);
  padding:20px 22px;backdrop-filter:blur(22px);box-shadow:var(--shadow);
  position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s}
.card:hover{transform:translateY(-3px);box-shadow:var(--shadow),var(--glow)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,180,216,.45),transparent)}
.card h3{font-size:11px;font-weight:700;color:var(--w50);margin-bottom:15px;
  letter-spacing:.1em;text-transform:uppercase}

/* KPI */
.kpi-icon{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center}
.kpi-icon svg{width:20px;height:20px}
.kpi-label{font-size:10.5px;font-weight:600;color:var(--w50);letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px}
.kpi-val{font-size:28px;font-weight:900;line-height:1;letter-spacing:-1px}
.kpi-val.cyan{background:linear-gradient(135deg,#fff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.kpi-val.green{background:linear-gradient(135deg,#fff,#00e096);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.kpi-val.warn{background:linear-gradient(135deg,#fff,#ffb830);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.kpi-sub{font-size:11px;color:var(--w50);margin-top:7px}
.kpi-card::after{content:'';position:absolute;bottom:-22px;right:-22px;width:110px;height:110px;
  border-radius:50%;background:radial-gradient(circle,rgba(0,180,216,.1),transparent 70%)}

/* BARS */
.chart{display:flex;align-items:flex-end;gap:5px;height:195px;padding:0 2px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
.bval{font-size:8.5px;color:var(--w50);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.bar{width:100%;border-radius:5px 5px 2px 2px;min-height:4px;position:relative;overflow:hidden;
  transform-origin:bottom;animation:growUp .75s cubic-bezier(.34,1.56,.64,1) both}
.bar::after{content:'';position:absolute;top:0;left:0;right:0;height:38%;background:rgba(255,255,255,.14);border-radius:inherit}
.bar.fb{background:linear-gradient(180deg,#00d4ff,#0070d0);box-shadow:0 0 14px rgba(0,180,216,.38)}
.bar.mb{background:linear-gradient(180deg,#00e096,#00a06a);box-shadow:0 0 14px rgba(0,224,150,.28)}
.blbl{font-size:9.5px;color:var(--w50);text-align:center}
@keyframes growUp{from{transform:scaleY(0);opacity:0}to{transform:scaleY(1);opacity:1}}

/* ITEMS */
.stack{display:flex;flex-direction:column;gap:7px;max-height:320px;overflow-y:auto}
.stack::-webkit-scrollbar{width:4px}
.stack::-webkit-scrollbar-thumb{background:rgba(0,180,216,.25);border-radius:2px}
.item{display:flex;justify-content:space-between;align-items:center;gap:10px;
  padding:9px 11px;background:rgba(0,38,76,.42);border-radius:var(--r-sm);
  border:1px solid var(--line);transition:all .2s}
.item:hover{background:rgba(0,58,118,.5);border-color:var(--card-bd)}
.item-lbl{font-size:12px;color:var(--w70);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.tag.c{background:rgba(0,180,216,.14);border:1px solid rgba(0,180,216,.28);color:var(--cyan-glow)}
.tag.g{background:rgba(0,224,150,.1);border:1px solid rgba(0,224,150,.22);color:var(--green)}
.tag.w{background:rgba(255,184,48,.1);border:1px solid rgba(255,184,48,.22);color:var(--warn)}
.tag.d{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.22);color:var(--danger)}

.tw::-webkit-scrollbar{width:5px;height:5px}
.tw::-webkit-scrollbar-track{background:rgba(0,18,42,.5)}
.tw::-webkit-scrollbar-thumb{background:rgba(0,180,216,.28);border-radius:3px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:10px 12px;text-align:left;vertical-align:middle;border-bottom:1px solid rgba(255,255,255,.05)}
th{background:rgba(0,22,50,.96);color:var(--w50);font-size:10px;font-weight:700;

tr:hover td{background:rgba(0,55,115,.22)}
td{color:var(--w70)}
td b{color:var(--white)}

.guide{background:rgba(0,28,60,.82);border:1px solid rgba(255,184,48,.3);

.guide-head{color:var(--warn);font-size:13px;font-weight:700;margin-bottom:10px}
.guide-sub{font-size:11.5px;color:var(--w50);margin-bottom:14px;line-height:1.55}
.guide-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:13px}
.guide-step{background:rgba(0,38,76,.5);border:1px solid var(--line);border-radius:var(--r-md);padding:14px 16px}

code{background:rgba(0,180,216,.14);padding:1px 5px;border-radius:4px;font-size:10px;color:var(--cyan)}

/* FOOTER */
.footer{display:flex;justify-content:space-between;align-items:center;padding:13px 18px;

.empty{text-align:center;padding:28px;color:var(--w50);font-size:12px}

/* RESPONSIVE */
@media(max-width:1200px){.g4{grid-template-columns:1fr 1fr}.g2,.g2r{grid-template-columns:1fr}}
@media(max-width:768px){.wrap{padding:14px}.g4{grid-template-columns:1fr}.header{flex-direction:column}.kpi-val{font-size:22px}}
</style>
</head>

function animCount(el, target, currency=false) {
  if(!el) return;
  const dur=900, t0=performance.now();
  const step = now => {
    const p = Math.min((now-t0)/dur,1), e=1-Math.pow(1-p,3), v=target*e;
    el.textContent = currency ? 'R$ '+fmt(v) : inti(v);
    if(p<1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

// ── GOOGLE SHEETS via Apps Script (sem cache) ────────────
async function fetchSheetFrom(sheetId, name) {
  const url = `${SCRIPT_URL}?id=${sheetId}&sheet=${encodeURIComponent(name)}&t=${Date.now()}`;
  const res  = await fetch(url);               // lança só em erro de rede
  const text = await res.text();
  try {
    const data = JSON.parse(text);
    return Array.isArray(data) ? data : [];    // erro JSON do script → aba vazia
  } catch(e) {
    return [];                                 // resposta HTML/redirect → aba vazia
  }
}
const fetchSheet = name => fetchSheetFrom(FUEL_SHEET_ID, name);

// ── DATE PARSER ──────────────────────────────────────────
function parseDate(v) {
  if(v===null||v===undefined||v==='') return null;
  const s = String(v);
  // gviz: Date(2025,10,13) — month is 0-indexed
  const gm = s.match(/^Date\((\d+),(\d+),(\d+)\)$/);
  if(gm) {
    const d = new Date(+gm[1], +gm[2], +gm[3]);
    return isNaN(d)?null:d.toISOString().slice(0,10);
  }
  // M/D/YY or M/D/YYYY
  const pm = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(pm) {
    let yr = +pm[3];
    if(yr < 100) yr += (yr < 50 ? 2000 : 1900);
    const d = new Date(yr, +pm[1]-1, +pm[2]);
    return isNaN(d)?null:d.toISOString().slice(0,10);
  }
  // ISO or other parseable string
  const d = new Date(s);
  return isNaN(d)?null:d.toISOString().slice(0,10);
}

function txFuelRow(r, month) {
  const placa = (r['Placa']||r['PLACA']||'').trim();
  if(!placa) return null;
  return {
    month, monthLabel: MOS[month-1]||'',
    placa,
    modelo:          (r['Modelo']      ||'').trim(),
    familia:         (r['Família']     ||r['Familia']||'').trim(),
    ano:             (r['Ano']         ||''),
    marca:           (r['Marca']       ||'').trim(),
    nrFrota:         (r['Nr.Frota']    ||''),
    tipoFrota:       '',
    tipoCombustivel: (r['Tipo Combustível']||r['Tipo Combustivel']||'').trim(),
    cartao:          +(r['Cartão R$']  ||0)||0,
    ultimaKm:        +(r['Última Km e/ou H']||0)||null,
    kmRodados:       +(r['Km Rodados'] ||0)||null,
    horasTrab:       +(r['Horas Trabalhadas']||0)||null,
    litros:          +(r['Litros']     ||0)||null,
    valorMedioLitro: +(r['Valor Médio (R$) Litro']||0)||null,
    kmPorLitro:      +(r['Km por Litro']||0)||null,
    litrosPorHora:   +(r['Litros/Hora']||0)||null,
    total:           +(r['Total (R$) Transação']||r['Total (R$)']||0)||0,
  };
}

function txMaintRow(r, month) {
  const placa = (r['PLACA']||r['Placa']||r['placa']||'').trim();
  if(!placa) return null;
  const entRaw = r['ENTRADA OFICINA']||r['Entrada']||r['entrada']||null;
  const saiRaw = r['SAÍDA OFICINA']||r['SAIDA OFICINA']||r['Saída']||r['saida']||null;
  const ent = parseDate(entRaw);
  const sai = parseDate(saiRaw);
  const today = new Date(); today.setHours(0,0,0,0);
  const days = ent&&sai
    ? Math.round((new Date(sai+'T00:00:00')-new Date(ent+'T00:00:00'))/864e5)
    : ent ? Math.round((today-new Date(ent+'T00:00:00'))/864e5) : null;
  return {
    month, monthLabel: MOS[month-1]||'',
    placa,
    modelo:    (r['MODELO']  ||r['Modelo']  ||'').trim(),
    lotacao:   (r['LOTAÇÃO'] ||r['LOTACAO'] ||r['Lotação']||'').trim(),
    veiculo:   (r['VEICULO'] ||r['VEÍCULO'] ||r['Veiculo']||'').trim(),
    tipoFrota: (r['TIPO FROTA']||r['Tipo Frota']||'').trim(),
    entrada: ent, saida: sai,
    motivo:    (r['MOTIVO']  ||r['Motivo']  ||'').trim(),
    eventMonth: month, eventMonthLabel: MOS[month-1]||'',
    daysInShop: days,
    status: sai?'Liberado':'Em oficina',
    active: !sai && !!ent,
  };
}

function buildAgg(fuel, maint) {
  const fuelMonthly = MOS.map((l,i)=>{
    const m=i+1, r=fuel.filter(x=>x.month===m);
    return {month:m,label:l,total:r.reduce((a,b)=>a+(b.total||0),0),litros:r.reduce((a,b)=>a+(b.litros||0),0)};
  });
  const maintMonthly = MOS.map((l,i)=>{
    const m=i+1; return {month:m,label:l,ativos:maint.filter(x=>x.month===m&&x.active).length};
  });
  const vehicleMeta={};
  [...fuel,...maint].forEach(r=>{
    if(r.placa&&!vehicleMeta[r.placa]) vehicleMeta[r.placa]={familia:r.familia,tipoFrota:r.tipoFrota,modelo:r.modelo};
  });
  const allPlates=[...new Set([...fuel.map(r=>r.placa),...maint.map(r=>r.placa)])].filter(Boolean).sort();
  return {fuelMonthly,maintMonthly,vehicleMeta,allPlates};
}

// ── LOAD DATA ────────────────────────────────────────────
async function loadData() {
  setStatus('loading','Buscando dados...');
  const btn=$('#rBtn'); btn.classList.add('spin'); $('#rLbl').textContent='Buscando...';

  // ── Combustível: 12 abas mensais de "ALDO ANUAL frotas geope 2026"
  let fuel = [], fuelReachable = false;
  try {
    const fResults = await Promise.allSettled(
      MONTH_TABS.map((tab, i) =>
        fetchSheetFrom(FUEL_SHEET_ID, tab).then(rows => ({ rows, month: i+1 }))
      )
    );
    // Se pelo menos 1 aba respondeu (mesmo vazia) = planilha acessível
    fuelReachable = fResults.some(r => r.status === 'fulfilled');
    const seenF = new Map();
    fResults.forEach(r => {
      if(r.status !== 'fulfilled') return;
      const {rows, month} = r.value;
      rows.forEach(row => {
        const ev = txFuelRow(row, month);
        if(!ev) return;
        const key = `${ev.placa}|${month}|${ev.total}`;
        if(!seenF.has(key)) { seenF.set(key, true); fuel.push(ev); }
      });
    });
  } catch(e) { /* sem acesso */ }

  // ── Manutenção: 12 abas mensais de "RELAÇÃO DE VEÍCULOS NA OFICINA GEOPE 2026"
  let maint = [], maintReachable = false;
  try {
    const mResults = await Promise.allSettled(
      MONTH_TABS.map((tab, i) =>
        fetchSheetFrom(MAINT_SHEET_ID, tab).then(rows => ({ rows, month: i+1 }))
      )
    );
    maintReachable = mResults.some(r => r.status === 'fulfilled');
    const seenM = new Map();
    mResults.forEach(r => {
      if(r.status !== 'fulfilled') return;
      const {rows, month} = r.value;
      rows.forEach(row => {
        const ev = txMaintRow(row, month);
        if(!ev) return;
        const key = `${ev.placa}|${ev.entrada||''}`;
        if(!seenM.has(key)) { seenM.set(key, true); maint.push(ev); }
      });
    });
  } catch(e) { /* sem acesso */ }

  if(!fuelReachable && !maintReachable) {
    // Sem acesso a nenhuma planilha → demo com aviso
    DATA={fuelRecords:DEMO_FUEL,maintenanceEvents:DEMO_MAINT,...buildAgg(DEMO_FUEL,DEMO_MAINT)};
    fromSheets=false;
    setStatus('demo','Sem conexão · exibindo dados demo');
    $('#dSrc').textContent='Verifique se as planilhas estão públicas e o script está ativo';
  } else {
    // Planilhas acessíveis — usa o que veio (pode ser vazio se apagou os dados)
    DATA={fuelRecords:fuel,maintenanceEvents:maint,...buildAgg(fuel,maint)};
    fromSheets=true;
    const now=new Date().toLocaleString('pt-BR');
    setStatus('live',`Ao vivo · ${now}`);
    $('#dSrc').textContent=`Google Sheets · ${fuel.length} reg. combustível · ${maint.length} eventos manutenção`;
  }

  initFilters(); rerender();
  btn.classList.remove('spin'); $('#rLbl').textContent='Atualizar';
  resetCD();
}

// ── CHART ────────────────────────────────────────────────
function mkBars(items, cls) {
  if(!items.length) return '<div class="empty">Sem dados no recorte atual.</div>';
  const mx=Math.max(...items.map(x=>x.v),1);
  return `<div class="chart">${items.map((x,i)=>`
    <div class="bcol" style="animation-delay:${i*40}ms">
      <div class="bval">${x.f||inti(x.v)}</div>
      <div class="bar ${cls}" style="height:${Math.max(4,182*x.v/mx)}px;animation-delay:${i*55}ms"></div>
      <div class="blbl">${x.l}</div>
    </div>`).join('')}</div>`;
}

function topN(arr,key,val,n=10){
  const o={};
  arr.forEach(r=>{const k=r[key]||'N/I';o[k]=(o[k]||0)+(+r[val]||0);});
  return Object.entries(o).sort((a,b)=>b[1]-a[1]).slice(0,n);
}

        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </div>
      <div class="kpi-label">Maior Imobilização</div>
      <div class="kpi-val warn">${inti(mx)} dias</div>
      <div class="kpi-sub">evento mais longo registrado</div>
    </div>
  </div>
  <div class="g2">
    <div class="card">
      <h3>Veículos em Oficina por Mês</h3>
      ${mkBars(byMo,'mb')}
      <div class="note">Quantidade de veículos com ocorrência ativa em cada mês.</div>
    </div>
    <div class="card">
      <h3>Defeitos com Maior Impacto</h3>
      <div class="stack">
        ${topDef.map(([k,v])=>`<div class="item">
          <div class="item-lbl" style="font-size:11px">${k||'Não informado'}</div>
          <div class="tag ${v>30?'d':'g'}">${inti(v)} dias</div>
        </div>`).join('')||'<div class="empty">Sem dados.</div>'}
      </div>
    </div>
  </div>
  <div class="card">
    <h3>Histórico Detalhado de Manutenção</h3>
    <div class="tw"><table>
      <thead><tr><th>Mês</th><th>Placa</th><th>Modelo</th><th>Lotação</th><th>Motivo / Defeito</th><th>Entrada</th><th>Saída</th><th>Dias</th><th>Status</th></tr></thead>
      <tbody>${ev.map(r=>`<tr>
        <td>${r.eventMonthLabel||'—'}</td><td><b>${r.placa}</b></td><td>${r.modelo||'—'}</td>
        <td class="mu">${r.lotacao||'—'}</td>
        <td style="max-width:250px;white-space:normal;font-size:11px">${r.motivo||'Não informado'}</td>
        <td class="mu">${dateBR(r.entrada)}</td><td class="mu">${dateBR(r.saida)}</td>
        <td>${r.daysInShop!=null?`<b>${inti(r.daysInShop)}</b>`:'—'}</td>
        <td><span class="tag ${r.saida?'w':'d'}">${r.saida?'Liberado':'Em oficina'}</span></td>
      </tr>`).join('')||'<tr><td colspan="9" class="empty">Sem registros no filtro.</td></tr>'}
      </tbody>
    </table></div>
  </div>
  ${!fromSheets?guideHTML():''}`;

  setTimeout(()=>{ animCount($('#kmT'),ev.length); animCount($('#kmO'),open); },80);
}

// ── SETUP GUIDE ──────────────────────────────────────────
function guideHTML(){
  return `<div class="guide">
    <div class="guide-head">⚙️ Ativar dados de combustível ao vivo</div>
    <div class="guide-sub">Os dados de manutenção já estão conectados à planilha COGERH em tempo real. Para ativar também o combustível, configure a aba abaixo.</div>
    <div class="guide-grid">
      <div class="guide-step">
        <h4>📋 Aba "Combustivel" — planilha de combustíveis</h4>
        <p>Na planilha <b>1wwSfGPBj4ygd...</b>, crie uma aba chamada <b>Combustivel</b> com esses cabeçalhos na linha 1:</p>
        <ul>
          <li><code>Mês</code> — número (1-12)</li>
          <li><code>Label</code> — Jan, Fev, Mar...</li>
          <li><code>Placa</code> — placa do veículo</li>
          <li><code>Modelo</code> e <code>Família</code></li>
          <li><code>Tipo Frota</code> — PROPRIA / LOCADA</li>
          <li><code>Tipo Combustível</code></li>
          <li><code>Litros</code> e <code>Km Rodados</code></li>
          <li><code>Km/L</code> e <code>Total (R$)</code></li>
        </ul>
      </div>
      <div class="guide-step">
        <h4>🔒 Compartilhamento</h4>
        <p>A planilha de combustíveis precisa ser pública para leitura:</p>
        <ul>
          <li>Abra a planilha → <b>Arquivo → Compartilhar</b></li>
          <li>Clique em <b>"Qualquer pessoa com o link"</b></li>
          <li>Permissão: <b>Visualizador</b></li>
          <li>Salve e clique em <b>Atualizar</b> no painel</li>
        </ul>
        <p style="margin-top:8px;color:var(--cyan)">A manutenção já sincroniza automaticamente a cada ${REFRESH_S} segundos.</p>
      </div>
    </div>
  </div>`;
}

// ── RERENDER ─────────────────────────────────────────────
function rerender(){ renderFuel(); renderMaint(); }

// ── TABS ─────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  $(`#sec-${btn.dataset.tab}`).classList.add('active');
}));

// ── FILTER LISTENERS ─────────────────────────────────────
['#fMonth','#fPlate','#fDef'].forEach(s=>$(s).addEventListener('input',rerender));

// ── COUNTDOWN ────────────────────────────────────────────
function resetCD(){
  cdVal=REFRESH_S; clearInterval(cdTimer);
  cdTimer=setInterval(()=>{
    cdVal--;
    const el=$('#cdT'); if(el) el.textContent=cdVal+'s';
    if(cdVal<=0) loadData();
  },1000);
}

// ── INIT ─────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
